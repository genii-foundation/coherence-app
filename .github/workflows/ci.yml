name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  apple-foundation:
    runs-on: macos-26
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer
      COHERENCE_EXPECTED_XCODE_VERSION: "26.6"
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned project generator
        run: |
          curl -fsSL https://github.com/yonaskolb/XcodeGen/releases/download/2.45.4/xcodegen.zip -o "$RUNNER_TEMP/xcodegen.zip"
          echo "090ec29491aad50aec10631bf6e62253fed733c50f3aab0f5ffc86bc170bdbef  $RUNNER_TEMP/xcodegen.zip" | shasum -a 256 -c -
          unzip -q "$RUNNER_TEMP/xcodegen.zip" -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/xcodegen/bin" >> "$GITHUB_PATH"
      - name: Verify generated Xcode project
        run: |
          ./scripts/generate-apple-project.sh
          git diff --exit-code -- apps/apple/Coherence.xcodeproj
      - name: Validate shared and Apple foundations
        run: ./scripts/validate.sh
      - name: Upload test results after failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: apple-validation-results
          path: .build/apple-validation/Results/*.xcresult
          if-no-files-found: ignore
          retention-days: 7
