name: Coherence

options:
  minimumXcodeGenVersion: 2.45.4
  xcodeVersion: "17.0"
  projectFormat: xcode16_0
  bundleIdPrefix: org.providencecollective
  createIntermediateGroups: true
  defaultConfig: Debug
  localPackagesGroup: Packages
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: ../../config/apple/xcode/Debug.xcconfig
  Release: ../../config/apple/xcode/Release.xcconfig

packages:
  CoherenceKit:
    path: ../../packages/swift/CoherenceKit

fileGroups:
  - README.md
  - project.yml
  - ../../config/apple/xcode

targets:
  CoherenceApp:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: ios/Sources
      - path: shared/Sources
      - path: ios/Resources
    settings:
      base:
        PRODUCT_NAME: Coherence
        PRODUCT_MODULE_NAME: CoherenceApp
        PRODUCT_BUNDLE_IDENTIFIER: org.providencecollective.coherence
        INFOPLIST_FILE: ios/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ios/Coherence.entitlements
        GENERATE_INFOPLIST_FILE: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        TARGETED_DEVICE_FAMILY: 1
    dependencies:
      - package: CoherenceKit
        products:
          - CoherenceCore
          - CoherenceAcquisition
          - CoherenceData
          - CoherenceSync
          - CoherenceFeatures
      - target: CoherenceWatchApp
        embed: true
        link: false

  CoherenceWatchApp:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: watchos/Sources
      - path: shared/Sources
      - path: watchos/Resources
    settings:
      base:
        PRODUCT_NAME: CoherenceWatchApp
        PRODUCT_MODULE_NAME: CoherenceWatchApp
        PRODUCT_BUNDLE_IDENTIFIER: org.providencecollective.coherence.watchkitapp
        INFOPLIST_FILE: watchos/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: watchos/CoherenceWatch.entitlements
        GENERATE_INFOPLIST_FILE: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: 4
    dependencies:
      - package: CoherenceKit
        products:
          - CoherenceCore
          - CoherenceAcquisition
          - CoherenceData
          - CoherenceSync

  CoherenceAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: ios/Tests/CoherenceAppTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.providencecollective.coherence.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Coherence.app/Coherence
        BUNDLE_LOADER: $(TEST_HOST)
    dependencies:
      - target: CoherenceApp
      - package: CoherenceKit
        products:
          - CoherenceCore
          - CoherenceAcquisition

  CoherenceAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: ios/Tests/CoherenceAppUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.providencecollective.coherence.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: CoherenceApp
    dependencies:
      - target: CoherenceApp

  CoherenceWatchAppTests:
    type: bundle.unit-test
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: watchos/Tests/CoherenceWatchAppTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.providencecollective.coherence.watchkitapp.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: CoherenceWatchApp
      - package: CoherenceKit
        products:
          - CoherenceCore
          - CoherenceAcquisition

schemes:
  Coherence:
    build:
      targets:
        CoherenceApp: all
    run:
      config: Debug
      commandLineArguments:
        COHERENCE_USE_FAKE_SENSORS=1: true
        COHERENCE_SESSION_FIXTURE=interactive: true
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - name: CoherenceAppTests
        - name: CoherenceAppUITests
    management:
      shared: true
      orderHint: 0

  CoherenceWatch:
    build:
      targets:
        CoherenceWatchApp: all
    run:
      config: Debug
      commandLineArguments:
        COHERENCE_USE_FAKE_SENSORS=1: true
        COHERENCE_SESSION_FIXTURE=interactive: true
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - name: CoherenceWatchAppTests
    management:
      shared: true
      orderHint: 1
